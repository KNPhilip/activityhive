services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: activityhive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d activityhive"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      TokenKey: "my top super duper secret fantastic and omega epic private security key"
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;User Id=admin;Password=secret;Database=activityhive;"
      DATABASE_URL: "postgres://admin:secret@postgres:5432/activityhive"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
